name: Deploy KPI Backend

on:
  push:
    branches: [master]
    paths:
      - 'spider/apps/spider-kpi/backend/**'
      - 'spider/apps/spider-kpi/scripts/**'
      - 'spider/apps/spider-kpi/deploy/**'
      - 'spider/apps/spider-kpi/README.md'
      - 'spider/apps/spider-kpi/DEPLOYMENT.md'
      - 'spider/apps/spider-kpi/backend/alembic/**'
      - '.github/workflows/deploy-kpi-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_KPI_SSH_KEY }}

      - name: Add droplet host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DO_KPI_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy backend on droplet
        env:
          DO_KPI_HOST: ${{ secrets.DO_KPI_HOST }}
          DO_KPI_USER: ${{ secrets.DO_KPI_USER }}
          DO_KPI_PORT: ${{ secrets.DO_KPI_PORT != '' && secrets.DO_KPI_PORT || '22' }}
        run: |
          ssh -p "$DO_KPI_PORT" "$DO_KPI_USER@$DO_KPI_HOST" <<'EOF'
          set -euo pipefail
          cd /opt/spiderclawkpi/spider/apps/spider-kpi
          git fetch origin
          git checkout master
          git pull --ff-only origin master
          ./.venv/bin/pip install -r backend/requirements.txt
          if [ -x ./.venv/bin/alembic ]; then
            (cd backend && ../.venv/bin/alembic upgrade head)
          fi
          systemctl restart spider-kpi.service
          systemctl is-active spider-kpi.service
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 2
          done
          echo "backend health check did not recover in time" >&2
          systemctl status spider-kpi.service --no-pager || true
          journalctl -u spider-kpi.service -n 80 --no-pager || true
          exit 1
          EOF

      - name: Post-deploy connector sync + validation
        env:
          DO_KPI_HOST: ${{ secrets.DO_KPI_HOST }}
          DO_KPI_USER: ${{ secrets.DO_KPI_USER }}
          DO_KPI_PORT: ${{ secrets.DO_KPI_PORT != '' && secrets.DO_KPI_PORT || '22' }}
        run: |
          ssh -p "$DO_KPI_PORT" "$DO_KPI_USER@$DO_KPI_HOST" <<'EOF'
          set -euo pipefail
          cd /opt/spiderclawkpi/spider/apps/spider-kpi
          ./.venv/bin/python - <<'PY'
          from pathlib import Path
          from urllib.request import Request, urlopen
          pw = Path('.env').read_text().split('APP_PASSWORD=', 1)[1].splitlines()[0].strip()
          base = 'http://127.0.0.1:8000'
          for source in ['shopify', 'triplewhale', 'freshdesk']:
              req = Request(base + f'/api/admin/run-sync/{source}', method='POST')
              req.add_header('X-App-Password', pw)
              print(source, urlopen(req).read().decode())
          for endpoint in ['/api/telemetry/summary', '/api/admin/debug/telemetry-stream']:
              req = Request(base + endpoint)
              req.add_header('X-App-Password', pw)
              print(endpoint, urlopen(req).read().decode())
          PY
          DB_URL=$(grep '^DATABASE_URL=' .env | cut -d= -f2-)
          ./.venv/bin/python scripts/validate_shopify_window.py --db-url "$DB_URL" --start 2026-03-29 --end 2026-04-05 || true
          curl -fsS http://127.0.0.1:8000/api/source-health
          EOF
