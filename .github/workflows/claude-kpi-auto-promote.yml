name: Auto-promote Claude KPI branches

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


on:
  push:
    branches:
      - 'claude/**'
    paths:
      - 'spider/apps/spider-kpi/**'
      - '.github/workflows/claude-kpi-auto-promote.yml'
      - '.github/workflows/deploy-kpi-backend.yml'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: auto-promote-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-promote:
    name: Validate Claude KPI update and merge to master
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: spider/apps/spider-kpi/frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            spider/apps/spider-kpi/backend/requirements.txt
            spider/apps/spider-kpi/requirements.txt

      - name: Install frontend deps
        working-directory: spider/apps/spider-kpi/frontend
        run: npm ci

      - name: Build frontend
        working-directory: spider/apps/spider-kpi/frontend
        run: npm run build

      - name: Install backend deps
        working-directory: spider/apps/spider-kpi
        run: python -m pip install -r backend/requirements.txt

      - name: Validate backend imports
        working-directory: spider/apps/spider-kpi/backend
        run: python -m compileall app

      - name: Merge validated branch into master
        env:
          HEAD_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin master "$HEAD_BRANCH"
          git checkout -B master origin/master
          git merge --no-ff --no-edit "origin/$HEAD_BRANCH"
          git push origin master

  verify-frontend:
    name: Verify KPI frontend public surface after Claude merge
    runs-on: ubuntu-latest
    needs: validate-and-promote
    defaults:
      run:
        working-directory: spider/apps/spider-kpi/frontend
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: spider/apps/spider-kpi/frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_KPI_SSH_KEY }}

      - name: Add droplet host to known_hosts
        working-directory: .
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DO_KPI_HOST }}" >> ~/.ssh/known_hosts

      - name: Probe backend + frontend health on droplet
        working-directory: .
        env:
          DO_KPI_HOST: ${{ secrets.DO_KPI_HOST }}
          DO_KPI_USER: ${{ secrets.DO_KPI_USER }}
          DO_KPI_PORT: ${{ secrets.DO_KPI_PORT != '' && secrets.DO_KPI_PORT || '22' }}
        run: |
          # The public hostname (kpi.spidergrills.com) sits behind a host/IP
          # allowlist that rejects GitHub-hosted runners with 403. Probe the
          # app locally on the droplet instead — same thing we really care
          # about (is the service serving), minus the allowlist noise.
          ssh -p "$DO_KPI_PORT" "$DO_KPI_USER@$DO_KPI_HOST" <<'EOF'
          set -euo pipefail
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null &&                curl -fsS http://127.0.0.1:8000/api/source-health >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo 'droplet backend + source-health did not become healthy in time' >&2
          systemctl status spider-kpi.service --no-pager || true
          journalctl -u spider-kpi.service -n 60 --no-pager || true
          exit 1
          EOF

  deploy-backend:
    name: Deploy KPI backend after Claude merge
    runs-on: ubuntu-latest
    needs:
      - validate-and-promote
      - verify-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_KPI_SSH_KEY }}

      - name: Add droplet host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DO_KPI_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy backend on droplet (with auto-rollback + notify)
        env:
          DO_KPI_HOST: ${{ secrets.DO_KPI_HOST }}
          DO_KPI_USER: ${{ secrets.DO_KPI_USER }}
          DO_KPI_PORT: ${{ secrets.DO_KPI_PORT != '' && secrets.DO_KPI_PORT || '22' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          ssh -p "$DO_KPI_PORT" \
            "$DO_KPI_USER@$DO_KPI_HOST" \
            "RUN_URL='$RUN_URL' SOURCE_TAG='gha-auto-promote' bash -s" <<'EOF'
          set -u
          REPO_ROOT=/opt/spiderclawkpi/spider
          APP_DIR="$REPO_ROOT/apps/spider-kpi"
          cd "$APP_DIR"
          NOTIFIER="$APP_DIR/scripts/notify_deploy_outcome.py"
          VENV_PY="$APP_DIR/.venv/bin/python"

          notify() {
            local outcome="$1"; shift
            local error_msg="${1:-}"
            if [ -x "$VENV_PY" ] && [ -f "$NOTIFIER" ]; then
              "$VENV_PY" "$NOTIFIER" \
                --outcome "$outcome" \
                --old-sha "$OLD_SHA" \
                --new-sha "$NEW_SHA" \
                --source "$SOURCE_TAG" \
                ${RUN_URL:+--run-url "$RUN_URL"} \
                ${error_msg:+--error "$error_msg"} || true
            fi
          }

          health_ok() {
            for _ in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
                return 0
              fi
              sleep 2
            done
            return 1
          }

          OLD_SHA=$(git -C "$REPO_ROOT" rev-parse HEAD)
          NEW_SHA="$OLD_SHA"
          git -C "$REPO_ROOT" fetch origin
          git -C "$REPO_ROOT" checkout master
          git -C "$REPO_ROOT" pull --ff-only origin master
          NEW_SHA=$(git -C "$REPO_ROOT" rev-parse HEAD)

          set -e
          "$APP_DIR/.venv/bin/pip" install -r backend/requirements.txt
          if [ -x "$APP_DIR/.venv/bin/alembic" ]; then
            (cd backend && "$APP_DIR/.venv/bin/alembic" upgrade head)
          fi
          set +e

          systemctl restart spider-kpi.service
          if health_ok; then
            notify success
            exit 0
          fi

          echo "NEW SHA $NEW_SHA UNHEALTHY — rolling back to $OLD_SHA" >&2
          systemctl status spider-kpi.service --no-pager || true
          journalctl -u spider-kpi.service -n 80 --no-pager || true

          git -C "$REPO_ROOT" checkout "$OLD_SHA" --quiet
          "$APP_DIR/.venv/bin/pip" install -r backend/requirements.txt || true
          systemctl restart spider-kpi.service
          if health_ok; then
            notify rolled_back "new SHA $NEW_SHA failed health check"
            exit 1
          fi

          notify failure "deploy + rollback both failed"
          exit 2
          EOF

      - name: Post-deploy connector sync + validation
        env:
          DO_KPI_HOST: ${{ secrets.DO_KPI_HOST }}
          DO_KPI_USER: ${{ secrets.DO_KPI_USER }}
          DO_KPI_PORT: ${{ secrets.DO_KPI_PORT != '' && secrets.DO_KPI_PORT || '22' }}
        run: |
          ssh -p "$DO_KPI_PORT" "$DO_KPI_USER@$DO_KPI_HOST" <<'EOF'
          set -euo pipefail
          cd /opt/spiderclawkpi/spider/apps/spider-kpi
          ./.venv/bin/python - <<'PY'
          from pathlib import Path
          from urllib.request import Request, urlopen
          pw = Path('.env').read_text().split('APP_PASSWORD=', 1)[1].splitlines()[0].strip()
          base = 'http://127.0.0.1:8000'
          for source in ['shopify', 'triplewhale', 'freshdesk']:
              req = Request(base + f'/api/admin/run-sync/{source}', method='POST')
              req.add_header('X-App-Password', pw)
              print(source, urlopen(req).read().decode())
          for endpoint in ['/api/telemetry/summary', '/api/admin/debug/telemetry-stream']:
              req = Request(base + endpoint)
              req.add_header('X-App-Password', pw)
              print(endpoint, urlopen(req).read().decode())
          PY
          DB_URL=$(grep '^DATABASE_URL=' .env | cut -d= -f2-)
          ./.venv/bin/python scripts/validate_shopify_window.py --db-url "$DB_URL" --start 2026-03-29 --end 2026-04-05 || true
          curl -fsS http://127.0.0.1:8000/api/source-health
          EOF

      - name: Validate frontend + API routing on droplet
        env:
          DO_KPI_HOST: ${{ secrets.DO_KPI_HOST }}
          DO_KPI_USER: ${{ secrets.DO_KPI_USER }}
          DO_KPI_PORT: ${{ secrets.DO_KPI_PORT != '' && secrets.DO_KPI_PORT || '22' }}
        run: |
          # Post-deploy smoke test. Public hostname is behind a host-allowlist
          # that rejects GH-hosted runners, so check from the droplet itself.
          ssh -p "$DO_KPI_PORT" "$DO_KPI_USER@$DO_KPI_HOST" <<'EOF'
          set -euo pipefail
          curl -fsS http://127.0.0.1:8000/ >/dev/null
          curl -fsS http://127.0.0.1:8000/api/source-health >/dev/null
          EOF
