name: Auto-promote Claude KPI branches

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


on:
  push:
    branches:
      - 'claude/**'
    paths:
      - 'spider/apps/spider-kpi/**'
      - '.github/workflows/claude-kpi-auto-promote.yml'
      - '.github/workflows/deploy-kpi-backend.yml'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: auto-promote-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-promote:
    name: Validate Claude KPI update and merge to master
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: spider/apps/spider-kpi/frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            spider/apps/spider-kpi/backend/requirements.txt
            spider/apps/spider-kpi/requirements.txt

      - name: Install frontend deps
        working-directory: spider/apps/spider-kpi/frontend
        run: npm ci

      - name: Build frontend
        working-directory: spider/apps/spider-kpi/frontend
        run: npm run build

      - name: Install backend deps
        working-directory: spider/apps/spider-kpi
        run: python -m pip install -r backend/requirements.txt

      - name: Validate backend imports
        working-directory: spider/apps/spider-kpi/backend
        run: python -m compileall app

      - name: Merge validated branch into master
        env:
          HEAD_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin master "$HEAD_BRANCH"
          git checkout -B master origin/master
          git merge --no-ff --no-edit "origin/$HEAD_BRANCH"
          git push origin master

  deploy-frontend:
    name: Deploy KPI frontend on Vercel after Claude merge
    runs-on: ubuntu-latest
    needs: validate-and-promote
    defaults:
      run:
        working-directory: spider/apps/spider-kpi/frontend
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: spider/apps/spider-kpi/frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy to Vercel Production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  deploy-backend:
    name: Deploy KPI backend after Claude merge
    runs-on: ubuntu-latest
    needs:
      - validate-and-promote
      - deploy-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_KPI_SSH_KEY }}

      - name: Add droplet host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DO_KPI_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy backend on droplet
        env:
          DO_KPI_HOST: ${{ secrets.DO_KPI_HOST }}
          DO_KPI_USER: ${{ secrets.DO_KPI_USER }}
          DO_KPI_PORT: ${{ secrets.DO_KPI_PORT != '' && secrets.DO_KPI_PORT || '22' }}
        run: |
          ssh -p "$DO_KPI_PORT" "$DO_KPI_USER@$DO_KPI_HOST" <<'EOF'
          set -euo pipefail
          cd /opt/spiderclawkpi/spider/apps/spider-kpi
          git fetch origin
          git checkout master
          git pull --ff-only origin master
          ./.venv/bin/pip install -r backend/requirements.txt
          if [ -x ./.venv/bin/alembic ]; then
            (cd backend && ../.venv/bin/alembic upgrade head)
          fi
          systemctl restart spider-kpi.service
          systemctl is-active spider-kpi.service
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 2
          done
          echo "backend health check did not recover in time" >&2
          systemctl status spider-kpi.service --no-pager || true
          journalctl -u spider-kpi.service -n 80 --no-pager || true
          exit 1
          EOF

      - name: Post-deploy connector sync + validation
        env:
          DO_KPI_HOST: ${{ secrets.DO_KPI_HOST }}
          DO_KPI_USER: ${{ secrets.DO_KPI_USER }}
          DO_KPI_PORT: ${{ secrets.DO_KPI_PORT != '' && secrets.DO_KPI_PORT || '22' }}
        run: |
          ssh -p "$DO_KPI_PORT" "$DO_KPI_USER@$DO_KPI_HOST" <<'EOF'
          set -euo pipefail
          cd /opt/spiderclawkpi/spider/apps/spider-kpi
          ./.venv/bin/python - <<'PY'
          from pathlib import Path
          from urllib.request import Request, urlopen
          pw = Path('.env').read_text().split('APP_PASSWORD=', 1)[1].splitlines()[0].strip()
          base = 'http://127.0.0.1:8000'
          for source in ['shopify', 'triplewhale', 'freshdesk']:
              req = Request(base + f'/api/admin/run-sync/{source}', method='POST')
              req.add_header('X-App-Password', pw)
              print(source, urlopen(req).read().decode())
          for endpoint in ['/api/telemetry/summary', '/api/admin/debug/telemetry-stream']:
              req = Request(base + endpoint)
              req.add_header('X-App-Password', pw)
              print(endpoint, urlopen(req).read().decode())
          PY
          DB_URL=$(grep '^DATABASE_URL=' .env | cut -d= -f2-)
          ./.venv/bin/python scripts/validate_shopify_window.py --db-url "$DB_URL" --start 2026-03-29 --end 2026-04-05 || true
          curl -fsS http://127.0.0.1:8000/api/source-health
          EOF

      - name: Validate public frontend + API routing
        run: |
          curl -fsS https://kpi.spidergrills.com/ >/dev/null
          curl -fsS https://kpi.spidergrills.com/api/source-health >/dev/null
