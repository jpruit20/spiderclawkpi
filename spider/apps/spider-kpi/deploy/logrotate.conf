# Log rotation for spider-kpi operational logs.
#
# Install on droplet:
#   sudo cp deploy/logrotate.conf /etc/logrotate.d/spider-kpi
#
# Policy: weekly rotation, keep 8 weeks (~2 months) of history, compress
# old rotations. Backfill logs keep 26 weeks (~6 months) because they
# document the one-time historical imports we may need to audit.

/var/log/spider-kpi-autopull.log
/var/log/spider-kpi-backfill-heartbeat.log
/var/log/spider-kpi-uvicorn-bounce.log
/var/log/spider-kpi-auto-regen-watcher.log
/var/log/spider-kpi-backup.log
/var/log/spider-kpi-daily-insights.log
/var/log/spider-kpi-job-failure.log
/var/log/spider-kpi-materialize.log
/var/log/spider-kpi-morning-email.log
/var/log/spider-kpi-staleness-watchdog.log
/var/log/spider-kpi-telemetry-anomalies.log
/var/log/spider-kpi-weekly-report.log
/var/log/spider-kpi-monthly-telemetry-report.log
{
    weekly
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
    sharedscripts
    su root root
}

/var/log/spider-kpi-backfill-v2.log
/var/log/spider-kpi-monthly-backfill.log
/var/log/spider-kpi-tw-archive.log
/var/log/spider-kpi-email-ingest.log
{
    weekly
    rotate 26
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
    sharedscripts
    su root root
}
