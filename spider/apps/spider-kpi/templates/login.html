<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spider KPI Login</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #08111f 0%, #050b17 100%);
      color: #eef4ff;
      font-family: Inter, system-ui, sans-serif;
    }
    .panel {
      width: min(420px, calc(100vw - 32px));
      background: rgba(17, 28, 56, 0.96);
      border: 1px solid rgba(110, 142, 211, 0.22);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p {
      margin: 0 0 18px;
      color: #9fb0d4;
      line-height: 1.5;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(110, 142, 211, 0.22);
      background: rgba(255,255,255,0.04);
      color: #eef4ff;
      margin-bottom: 14px;
      font-size: 15px;
    }
    button {
      width: 100%;
      padding: 14px 16px;
      border: 0;
      border-radius: 14px;
      background: #6ea8ff;
      color: #08111f;
      font-weight: 800;
      cursor: pointer;
      font-size: 15px;
    }
    .error {
      color: #ff8d97;
      margin-bottom: 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <form class="panel" method="post">
    <h1>Spider KPI</h1>
    <p>Enter the page password to access the internal dashboard for Spider Grills.</p>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <input type="password" name="password" placeholder="Password" autofocus required />
    <button type="submit">Enter dashboard</button>
  </form>
</body>
</html>
