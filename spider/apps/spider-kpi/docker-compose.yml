services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: spider_kpi
      POSTGRES_USER: spider
      POSTGRES_PASSWORD: spider
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://spider:spider@db:5432/spider_kpi
      PYTHONPATH: /app/backend
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - .env
    environment:
      VITE_API_BASE: http://localhost:8000
      VITE_APP_PASSWORD: ${APP_PASSWORD}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
