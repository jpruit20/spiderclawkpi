name: Auto-promote Claude KPI branches

on:
  push:
    branches:
      - 'claude/**'
    paths:
      - 'apps/spider-kpi/**'
      - '.github/workflows/claude-auto-promote-kpi.yml'
      - '.github/workflows/deploy-kpi.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-promote-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-promote:
    name: Validate Claude KPI update, merge to master, and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/spider-kpi/frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            apps/spider-kpi/backend/requirements.txt
            apps/spider-kpi/requirements.txt

      - name: Install frontend deps
        working-directory: apps/spider-kpi/frontend
        run: npm ci

      - name: Build frontend
        working-directory: apps/spider-kpi/frontend
        run: npm run build

      - name: Install backend deps
        working-directory: apps/spider-kpi
        run: python -m pip install -r backend/requirements.txt

      - name: Validate backend imports
        working-directory: apps/spider-kpi/backend
        run: python -m compileall app

      - name: Merge validated branch into master
        env:
          HEAD_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin master "$HEAD_BRANCH"
          git checkout -B master origin/master
          git merge --no-ff --no-edit "origin/$HEAD_BRANCH"
          git push origin master

  frontend-vercel:
    name: Deploy KPI Frontend (Vercel) after Claude merge
    runs-on: ubuntu-latest
    needs: validate-and-promote
    defaults:
      run:
        working-directory: apps/spider-kpi/frontend
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/spider-kpi/frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy to Vercel Production
        if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Frontend deploy notice
        if: ${{ secrets.VERCEL_TOKEN == '' || secrets.VERCEL_ORG_ID == '' || secrets.VERCEL_PROJECT_ID == '' }}
        run: echo 'Vercel secrets are not configured; build completed but production deploy was skipped.'

  backend-droplet:
    name: Deploy KPI Backend (Droplet) after Claude merge
    runs-on: ubuntu-latest
    needs: frontend-vercel
    if: ${{ secrets.DO_KPI_HOST != '' && secrets.DO_KPI_USER != '' && secrets.DO_KPI_SSH_KEY != '' }}
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DO_KPI_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.DO_KPI_PORT || '22' }}" -H "${{ secrets.DO_KPI_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy backend on droplet
        run: |
          ssh -p "${{ secrets.DO_KPI_PORT || '22' }}" ${{ secrets.DO_KPI_USER }}@${{ secrets.DO_KPI_HOST }} <<'EOF'
          set -euo pipefail
          cd /opt/spiderclawkpi/spider/apps/spider-kpi
          git fetch origin
          git checkout master
          git pull --ff-only origin master
          if [ -x .venv/bin/pip ]; then
            .venv/bin/pip install -r backend/requirements.txt
          fi
          if [ -x .venv/bin/alembic ]; then
            cd backend
            ../.venv/bin/alembic upgrade head
            cd ..
          fi
          sudo systemctl restart spider-kpi.service
          sudo systemctl is-active spider-kpi.service
          curl -fsS http://127.0.0.1:8000/health
          EOF

  backend-missing-secrets:
    name: Backend deploy skipped after Claude merge
    runs-on: ubuntu-latest
    needs: frontend-vercel
    if: ${{ secrets.DO_KPI_HOST == '' || secrets.DO_KPI_USER == '' || secrets.DO_KPI_SSH_KEY == '' }}
    steps:
      - run: echo 'Backend deploy secrets are not configured; backend production deploy skipped.'
